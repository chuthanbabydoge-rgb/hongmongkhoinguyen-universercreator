kind = "web"
previewPath = "/"
title = "Universe Creator Editor"
version = "1.0.0"
id = "artifacts/creator-editor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21026

[services.development]
run = "pnpm --filter @workspace/creator-editor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/creator-editor", "run", "build" ]
publicDir = "artifacts/creator-editor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21026"
BASE_PATH = "/"
